name: Build & Release Beta APK

on:
  push:
    tags:
      - 'v*-beta*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: beta

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor (copy assets + plugins)
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned-signed.apk \
             android/app/build/outputs/apk/release/pressscraper-${{ github.ref_name }}.apk

      - name: Create Prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: Beta ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: android/app/build/outputs/apk/release/pressscraper-${{ github.ref_name }}.apk
          prerelease: true
